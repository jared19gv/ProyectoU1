<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://kit.fontawesome.com/38825fd65d.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="sesion">
        <a href="PaginaPersonal.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2>Bienvenido</h2>
        <p>Ingresa tus datos para acceder</p>
        
        <!-- Formulario -->
        <form>
            <center>
            <!-- Campo de Usuario/Email -->
            <div>
                <label for="email">Usuario:</label>
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div><br><br>
            
            <!-- Campo de Contraseña -->
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div><br><br>
            </center>
            <!-- Botón de Envío -->
            <button type="submit">Ingresar</button><br>
            <a href="Registrar.html"><button type="button">Registrarse</button></a>

            
        </form>
        <br><br><br>

        <div>
            <a href="Contraseña.html">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

</body>
</html>
